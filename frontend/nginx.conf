# ---------------------------------------------------------------------------
# Minimal nginx config for the TrackFundAI vanilla-JS SPA.
#
# Serves /usr/share/nginx/html on port 3000. Falls back to index.html for any
# unknown path so the SPA's client-side router handles it.
#
# Gzip is enabled for text assets to keep page load snappy. Cache headers
# are tight (no-cache for index.html, 1h for JS/CSS) so updates roll out
# without users having to hard-reload.
# ---------------------------------------------------------------------------

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    server {
        listen 3000;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # SPA fallback — any unknown path serves the shell so the JS router
        # can handle it client-side.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Tight cache on the shell so updates roll out instantly.
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }

        # env.js is the per-environment runtime config. It MUST never be cached
        # by browsers or CDNs — otherwise an env swap (local ↔ staging) would
        # take up to an hour to propagate and API calls would fail silently.
        # Must be declared BEFORE the generic \.(?:css|js)$ block so it wins.
        location = /env.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # Modest cache on JS/CSS — busts naturally via file modification time.
        location ~* \.(?:css|js)$ {
            add_header Cache-Control "public, max-age=3600";
        }

        # Long cache on images and fonts (rarely change, easy to bust via URL).
        location ~* \.(?:png|jpg|jpeg|gif|svg|woff2?|ttf|eot)$ {
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
