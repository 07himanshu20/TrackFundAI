version: 1
frontend:
  phases:
    preBuild:
      commands: []
    build:
      commands:
        # ------------------------------------------------------------
        # Generate env.js from the env vars set in the Amplify Console
        # for this branch (App settings → Environment variables).
        #
        # Required env vars (set per branch in Amplify):
        #   API_BASE        e.g. https://staging-api.trackfundai.com/api
        #   API_ORIGIN      e.g. https://staging-api.trackfundai.com
        #   ENVIRONMENT     development | staging | production
        #   DEBUG           true | false
        #
        # Resilience built in:
        #   - Accepts ENVIRONMENT or ENVIRONMENTS (common typo).
        #   - Normalises DEBUG=TRUE/True/1 → true, anything else → false,
        #     so the generated env.js is always valid JS.
        #   - Missing vars fall back to safe localhost defaults.
        # ------------------------------------------------------------
        - ENV_NAME="${ENVIRONMENT:-${ENVIRONMENTS:-development}}"
        - DEBUG_RAW="${DEBUG:-false}"
        - DEBUG_LC=$(echo "$DEBUG_RAW" | tr '[:upper:]' '[:lower:]')
        - if [ "$DEBUG_LC" = "true" ] || [ "$DEBUG_LC" = "1" ] || [ "$DEBUG_LC" = "yes" ]; then DEBUG_JS=true; else DEBUG_JS=false; fi
        - echo "Generating env.js for branch=${AWS_BRANCH:-unknown} env=${ENV_NAME} debug=${DEBUG_JS}"
        - |
          cat > env.js <<EOF
          /* AUTO-GENERATED by amplify.yaml at build time. Do not edit. */
          (function () {
            window.APP_CONFIG = Object.freeze({
              API_BASE:    '${API_BASE:-http://127.0.0.1:8000/api}',
              API_ORIGIN:  '${API_ORIGIN:-http://127.0.0.1:8000}',
              ENVIRONMENT: '${ENV_NAME}',
              DEBUG:       ${DEBUG_JS},
            });
          })();
          EOF
        - echo "----- generated env.js -----" && cat env.js
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
  cache:
    paths: []
