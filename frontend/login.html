<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackFundAI — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%2303030a'/><text y='.9em' font-size='62' x='10' fill='%2300d4ff' font-family='monospace' font-weight='bold'>TF</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <script>
    // Apply saved theme immediately to prevent flash
    (function() {
      if (localStorage.getItem('tfai_theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <style>
    :root {
      --bg-void:        #03030a;
      --bg-deep:        #07071a;
      --bg-card:        #0b0b20;
      --accent-blue:    #00d4ff;
      --accent-green:   #00ff9d;
      --accent-red:     #ff4455;
      --text-primary:   #f0f0ff;
      --text-secondary: #8888aa;
      --text-muted:     #44445a;
      --border-glow:    rgba(0, 212, 255, 0.18);
      --border-subtle:  rgba(255, 255, 255, 0.06);
      --shadow-card:    0 16px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
      --radius-card:    16px;
      --radius-sm:      8px;
      --font-sans: 'Space Grotesk', system-ui, sans-serif;
      --font-mono: 'Space Mono', monospace;
      --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-void);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: var(--bg-void);
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    .bg-orb {
      position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3;
    }
    .bg-orb-1 {
      width: 600px; height: 600px; top: -200px; left: -100px;
      background: radial-gradient(circle, rgba(0,212,255,0.15), transparent);
      animation: float 20s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: 500px; height: 500px; bottom: -150px; right: -100px;
      background: radial-gradient(circle, rgba(0,255,157,0.12), transparent);
      animation: float 25s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -40px) scale(1.1); }
    }

    /* Login card */
    .login-card {
      position: relative; z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-card);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-card);
    }
    .login-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,212,255,0.04), transparent 60%);
      border-radius: var(--radius-card);
      pointer-events: none;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,255,157,0.10));
      border: 1px solid var(--border-glow);
      border-radius: 14px;
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent-blue);
      margin-bottom: 16px;
    }
    .login-brand h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .login-brand h1 span {
      color: var(--accent-blue);
    }
    .login-brand p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 15px;
      transition: border-color var(--transition);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
    }
    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-blue), #0099cc);
      border: none;
      border-radius: var(--radius-sm);
      color: #000;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      margin-top: 8px;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,212,255,0.25);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .login-error {
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(255,68,85,0.08);
      border: 1px solid rgba(255,68,85,0.3);
      border-radius: var(--radius-sm);
      color: var(--accent-red);
      font-size: 13px;
      display: none;
    }
    .login-error.visible { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .login-footer a {
      color: var(--accent-blue);
      text-decoration: none;
    }

    /* Light theme overrides for login */
    [data-theme="light"] {
      --bg-void:        #f4f5f8;
      --bg-deep:        #eaecf0;
      --bg-card:        #ffffff;
      --accent-blue:    #0088cc;
      --accent-green:   #00996b;
      --accent-red:     #d63340;
      --text-primary:   #111827;
      --text-secondary: #4b5563;
      --text-muted:     #9ca3af;
      --border-glow:    rgba(0, 136, 204, 0.22);
      --border-subtle:  rgba(0, 0, 0, 0.08);
      --shadow-card:    0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
    }
    [data-theme="light"] body {
      background: var(--bg-void);
    }
    [data-theme="light"] .bg-canvas {
      background: var(--bg-void);
    }
    [data-theme="light"] .bg-orb { opacity: 0.06; }
    [data-theme="light"] .login-card {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.08);
    }
    [data-theme="light"] .login-card::before {
      background: linear-gradient(135deg, rgba(0,136,204,0.03), transparent 60%);
    }
    [data-theme="light"] .form-group input {
      background: #f8f9fb;
      border-color: rgba(0, 0, 0, 0.12);
      color: var(--text-primary);
    }
    [data-theme="light"] .form-group input::placeholder {
      color: var(--text-muted);
    }
    [data-theme="light"] .btn-login {
      background: linear-gradient(135deg, #0088cc, #006699);
      color: #ffffff;
    }

    /* Theme toggle on login */
    .login-theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      width: 40px;
      height: 22px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 0 3px;
      transition: all 0.3s ease;
    }
    .login-theme-toggle:hover {
      border-color: var(--accent-blue);
      background: rgba(255, 255, 255, 0.12);
    }
    .login-theme-knob {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent-blue);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      line-height: 1;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    }
    .login-theme-knob::after {
      content: '\263E';
      color: #03030a;
    }
    [data-theme="light"] .login-theme-toggle {
      background: rgba(0, 0, 0, 0.06);
      border-color: rgba(0, 0, 0, 0.12);
    }
    [data-theme="light"] .login-theme-toggle:hover {
      background: rgba(0, 0, 0, 0.1);
    }
    [data-theme="light"] .login-theme-knob {
      transform: translateX(17px);
      background: #f59e0b;
    }
    [data-theme="light"] .login-theme-knob::after {
      content: '\2600';
      color: #ffffff;
    }
  </style>
</head>
<body>

  <button class="login-theme-toggle" id="login-theme-btn" title="Toggle light/dark theme">
    <span class="login-theme-knob"></span>
  </button>

  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">TF</div>
      <h1>Track<span>Fund</span>AI</h1>
      <p>AIF Fund Management Platform</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter username" autocomplete="username" autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="btn-login">Sign In</button>
    </form>

    <div class="login-error" id="login-error"></div>

    <div class="login-footer">
      TrackFundAI
    </div>
  </div>

  <script>
    // Theme switcher for login page
    (function() {
      const STORAGE_KEY = 'tfai_theme';
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');

      document.getElementById('login-theme-btn').addEventListener('click', function() {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        if (current === 'dark') {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem(STORAGE_KEY, 'light');
        } else {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem(STORAGE_KEY, 'dark');
        }
      });
    })();
  </script>
  <script src="auth.js"></script>
  <script>
    // If already logged in, redirect based on role
    if (Auth.isLoggedIn()) {
      const user = Auth.getUser();
      const role = user && user.role;
      if (role === 'lp_user') {
        window.location.href = 'lp-portal.html';
      } else {
        window.location.href = 'data-upload.html';
      }
    }

    const form = document.getElementById('login-form');
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('login-error');

    form.onsubmit = async (e) => {
      e.preventDefault();
      errEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      try {
        const data = await Auth.login(username, password);
        const role = data.user && data.user.role;
        if (role === 'lp_user') {
          window.location.href = 'lp-portal.html';
        } else {
          window.location.href = 'data-upload.html';
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    };
  </script>

</body>
</html>
