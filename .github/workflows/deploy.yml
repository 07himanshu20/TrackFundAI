name: Deploy TrackFundAI Backend

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            cd /home/ubuntu/TrackFundAI/backend

            echo "Pulling latest code..."
            git pull origin main

            echo "Running migrations..."
            sudo -u ubuntu bash -c "TFAI_ENV=development \
            GOOGLE_APPLICATION_CREDENTIALS=/home/ubuntu/aifdashboard-178f4d2a2a6f.json \
            ./venv/bin/python manage.py migrate --noinput"

            echo "Restarting TrackFundAI service..."
            sudo systemctl restart trackfundai

            echo "Checking service..."
            sudo systemctl is-active trackfundai
