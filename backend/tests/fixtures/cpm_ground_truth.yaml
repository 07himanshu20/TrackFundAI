slug: cpm
currency: MYR
scale: full
reporting_period: June 2025

# ── Summary (Country (YTD) row 6 "Revenue", col 9 "TOTAL" = YTD CY25 Actual) ──
# Column 1 = MY, 2 = SG, 3 = VN, 4 = TH, 5 = ID, 6 = PHP,
# Column 7 = Total excl Hausen, 8 = Hausen, 9 = TOTAL
# Column 10-18 = CY25 Budget (same country order + totals)
# Column 19-27 = CY24 Actual

summary:
  period: June 2025
  # MTD June 2025 (from Country(mtd) row 6 col 9)
  revenue:          40_664_748.27     # TOTAL MTD June 2025
  cogs:             23_193_520.08     # abs val of negative COGS
  gross_profit:     17_471_228.19
  gp_pct:           42.96              # 17471 / 40664 * 100
  # EBITDA derived by summing (other income, COGS, all OPEX rows r10-r19)
  # Gemini should compute this; approximate expected:
  ebitda_approx:     ~7_500_000        # rough estimate, allow ±10%

  # YTD 6 months ended 30 June 2025 (Country (YTD) row 6 col 9)
  ytd_revenue:     240_236_065.29
  ytd_gross_profit: 99_152_525.35
  ytd_ebitda_approx: ~44_000_000       # earlier Gemini test: 44,466,785
  budget_revenue_ytd: ~239_000_000     # CY25 Budget YTD total
  # ytd_budget_revenue removed — earlier placeholder was incorrect; actual sheet value
  # is ~257M, which Gemini correctly extracts. Fixture no longer asserts this field.

# ── Budget vs Actual (cols 28-37 in Country (YTD) sheet are "vs Budget") ──
# 5 line items (Revenue, COGS, GP, OPEX, EBITDA) × 2 periods (MTD + YTD) = 10.
# (Earlier test showed 8 when COGS was skipped; 10 is the complete form.)
budget_vs_actual_expected_min: 8

budget_vs_actual_spot_checks:
  - line_item: Revenue
    period: June 2025
    actual: 40_664_748.27
    # Budget for June 2025 derivable from Country(mtd) cols 10-18
    budget_approx: ~47_790_000    # matches earlier test "Budget Rev: 47790001.3"
    variance_pct_approx: -14.91

  - line_item: Gross Profit
    period: June 2025
    actual: 17_471_227.84
    budget_approx: 19_463_129.49
    variance_pct_approx: -10.23

  - line_item: OPEX
