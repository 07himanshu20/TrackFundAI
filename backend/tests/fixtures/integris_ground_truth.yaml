  summary: ">= 0.90"           # clean headline data
  monthly_pl: "<= 0.30"        # N/A in source — Gemini should say so
  cash_flow: "<= 0.50"         # partial cash rows may be pulled; <=0.5 is honest
  sales_by_segment: "<= 0.95"  # if country-as-segment is used, may be higher
  budget_vs_actual: ">= 0.90"
  sales_by_geo: ">= 0.85"
  overall: ">= 0.60"
